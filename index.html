<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="layout" id="layout">
        <aside id="left-column" class="left-col">
            <button id="view-toggle" onclick="toggleView()" class="view-toggle">Show Storage</button>
            <div id="menu">
                <div id="money">Money: $0</div>
                <div id="storage-info">Storage: Floppy Disk (1.44 MB used: 0 MB)</div>
                <div id="internet-speed">Internet Speed: 0.1 kb/s</div>
                <div id="bulk-controls"></div>
                <div id="black-market"></div>
                <div id="printer"></div>
            </div>
        </aside>

        <main id="center-column" class="center-col">
            <h2 id="center-title">Downloads</h2>
            <div id="downloads"></div>

            <div id="storage" style="display:none;"></div>
        </main>

        <aside id="right-column" class="right-col">
            <h2>Upgrades</h2>
            <div id="upgrades"></div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
